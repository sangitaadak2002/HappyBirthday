<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something special is coming... 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── Aurora ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift var(--d, 12s) ease-in-out infinite alternate;
    }

    .aurora-blob:nth-child(1) {
      width: 500px;
      height: 300px;
      background: #9b7fb6;
      top: -80px;
      left: -100px;
      --d: 14s;
    }

    .aurora-blob:nth-child(2) {
      width: 400px;
      height: 250px;
      background: #e8b4e3;
      top: 40%;
      right: -80px;
      --d: 11s;
      animation-delay: 2s;
    }

    .aurora-blob:nth-child(3) {
      width: 350px;
      height: 200px;
      background: #6a4c93;
      bottom: -60px;
      left: 30%;
      --d: 16s;
      animation-delay: 4s;
    }

    .aurora-blob:nth-child(4) {
      width: 280px;
      height: 180px;
      background: #c9a0dc;
      top: 20%;
      left: 40%;
      --d: 9s;
      animation-delay: 1s;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(40px, 30px) scale(1.1);
      }

      100% {
        transform: translate(-30px, 50px) scale(0.95);
      }
    }

    /* ── Moon ── */
    .moon {
      position: fixed;
      top: 28px;
      right: 36px;
      z-index: 1;
      pointer-events: none;
    }

    .moon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle at 35% 35%, #f5e6c8, #e8c97a);
      box-shadow: 0 0 24px 8px rgba(232, 201, 122, 0.25), 0 0 60px 20px rgba(232, 201, 122, 0.1);
      animation: moonPulse 4s ease-in-out infinite;
    }

    .moon-circle::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.08);
      top: 16px;
      left: 18px;
    }

    .moon-circle::after {
      content: '';
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.06);
      top: 30px;
      left: 36px;
    }

    @keyframes moonPulse {

      0%,
      100% {
        box-shadow: 0 0 24px 8px rgba(232, 201, 122, 0.25), 0 0 60px 20px rgba(232, 201, 122, 0.1);
      }

      50% {
        box-shadow: 0 0 36px 14px rgba(232, 201, 122, 0.38), 0 0 90px 30px rgba(232, 201, 122, 0.18);
      }
    }

    /* ── Shooting stars ── */
    .shooting-stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .shooting-star {
      position: absolute;
      height: 1.5px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, #fff 50%, rgba(255, 255, 255, 0) 100%);
      border-radius: 2px;
      opacity: 0;
      animation: shoot var(--dur, 2.5s) ease-in var(--delay, 0s) infinite;
      transform-origin: left center;
    }

    @keyframes shoot {
      0% {
        opacity: 0;
        transform: translateX(0) rotate(var(--angle, -20deg));
      }

      5% {
        opacity: 1;
      }

      60% {
        opacity: 0.6;
      }

      100% {
        opacity: 0;
        transform: translateX(var(--dist, 260px)) rotate(var(--angle, -20deg));
      }
    }

    /* ── Countdown ── */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      /* 2x2 grid looks better side by side */
      gap: 14px;
      margin-bottom: 1.2rem;
      animation: fadeUp 1s 0.4s ease both;
      width: 100%;
    }

    .unit {
      background: rgba(255, 255, 255, 0.05);
      border: 0.5px solid rgba(200, 160, 220, 0.25);
      border-radius: 14px;
      padding: 1.2rem 0.8rem;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .num {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #e8b4e3;
      line-height: 1;
    }

    .lbl {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #f9f9f9;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 40% 60%;
      gap: 24px;
      width: 100%;
      max-width: 1000px;
      margin-top: 1.5rem;
    }

    .left-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .right-col {
      display: flex;
      flex-direction: column;
    }

    .music-section {
      margin-top: 0;
      width: 100%;
      max-width: 100%;
      padding-bottom: 3.5rem;
      animation: none;
    }

    /* mobile: stack back to single column */
    @media (max-width: 640px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }


    .music-label {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
      font-style: italic;
      text-align: center;
      font-weight: 800;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(200, 160, 220, 0.15);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .track:hover {
      background: rgba(200, 160, 220, 0.08);
      border-color: rgba(200, 160, 220, 0.3);
    }

    .track.active {
      border-color: rgba(200, 160, 220, 0.55);
      background: rgba(200, 160, 220, 0.12);
    }

    .track-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(200, 160, 220, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
      color: #e8b4e3;
    }

    .track:hover .track-btn {
      transform: scale(1.08);
    }

    .track.active .track-btn {
      background: #c9a0dc;
      color: #0a0510;
    }

    .track-info {
      flex: 1;
      text-align: left;
      overflow: hidden;
    }

    .track-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f0d6f5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 0.72rem;
      color: #7a5f8a;
      font-style: italic;
      margin-top: 2px;
    }

    .track-progress {
      width: 100%;
      height: 2px;
      background: rgba(200, 160, 220, 0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 5px;
      display: none;
    }

    .track.active .track-progress {
      display: block;
    }

    .track-progress-fill {
      height: 100%;
      background: #c9a0dc;
      width: 0%;
      transition: width 0.5s linear;
      border-radius: 2px;
    }

    /* ── Sparkle name ── */
    .sparkle-name {
      position: fixed;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 3;
      pointer-events: none;
      animation: fadeUp 1.2s 1s ease both;
    }

    .sparkle-name span {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-style: italic;
      color: #e1cced;
      letter-spacing: 0.12em;
    }

    .sparkle-name em {
      color: #c9a0dc;
      font-style: normal;
      position: relative;
    }

    .sparkle-name em::before,
    .sparkle-name em::after {
      content: '✦';
      font-size: 0.6rem;
      color: #e8b4e3;
      position: absolute;
      top: -4px;
      animation: sparklePop 2s ease-in-out infinite;
    }

    .sparkle-name em::before {
      left: -14px;
      animation-delay: 0s;
    }

    .sparkle-name em::after {
      right: -14px;
      animation-delay: 1s;
    }

    .peek-wrap {
      text-align: left;
      animation: fadeUp 1s 1.1s ease both;
    }

    .peek-btn {
      background: transparent;
      border: 0.5px solid rgba(230, 216, 236, 0.4);
      color: #f5e1fe;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      padding: 0.7rem 2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      letter-spacing: 0.05em;
    }

    .peek-btn:hover {
      background: rgba(200, 160, 220, 0.08);
      border-color: rgba(200, 160, 220, 0.6);
      transform: scale(1.04);
    }

    .ruko-msg {
      display: none;
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      /* bigger */
      font-weight: 600;
      /* optional */
      font-style: italic;
      color: #e8b4e3;
      text-align: left;
      animation: fadeUp 0.5s ease both;
    }

    .arrow {
      display: inline-block;
      margin-left: 6px;
      animation: moveArrow 1s ease-in-out infinite;
    }

    @keyframes moveArrow {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(5px);
      }
    }



    @keyframes sparklePop {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    /* ── Heart burst ── */
    .burst-heart {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: var(--s, 1rem);
      animation: burstFly var(--dur, 0.9s) ease-out forwards;
    }

    @keyframes burstFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.5) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx, 0px), var(--ty, -80px)) scale(1.2) rotate(var(--rot, 20deg));
      }


    }

    /* ── Stars ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: transparent;
      animation: twinkle var(--d, 2s) ease-in-out infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
  </style>
</head>

<body>

  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>

  <div class="moon">
    <div class="moon-circle"></div>
  </div>
  <div class="shooting-stars" id="shootingStars"></div>
  <div class="stars" id="stars"></div>

  <div class="floaties">
    <span class="floaty" style="left:8%;top:20%;--d:5s">🌸</span>
    <span class="floaty" style="left:85%;top:15%;--d:7s;animation-delay:1s">✨</span>
    <span class="floaty" style="left:75%;top:70%;--d:6s;animation-delay:2s">🌸</span>
    <span class="floaty" style="left:15%;top:75%;--d:8s;animation-delay:0.5s">💫</span>
  </div>

  <main class="page-center">
    <h1 class="eyebrow" style="font-size:30px;">something special is coming !!!</h1>

    <h1 class="main-title" style="font-size:50px;">
      Your Day Is<br />
      <em>Almost Here</em> 🎂
    </h1>

    <p class="subtitle" style="font-weight:600;font-size:24px;">this surprise is just for you, my love ..</p>
    <div class="content-grid">

      <!-- LEFT: countdown + lock -->
      <div class="left-col">
        <div class="countdown-grid">
          <div class="unit">
            <div class="num" id="d">--</div>
            <div class="lbl">Days</div>
          </div>
          <div class="unit">
            <div class="num" id="h">--</div>
            <div class="lbl">Hours</div>
          </div>
          <div class="unit">
            <div class="num" id="m">--</div>
            <div class="lbl">Mins</div>
          </div>
          <div class="unit">
            <div class="num" id="s">--</div>
            <div class="lbl">Secs</div>
          </div>
        </div>



        <div class="peek-wrap" id="peekWrap">
          <button class="peek-btn" onclick="tryPeek()">
            Click Next <span class="arrow">👉</span>
          </button>
        </div>

        <div class="ruko-msg" id="rukoMsg"></div>
      </div>

      <!-- RIGHT: music player -->
      <div class="right-col">
        <div class="music-section">
          <p class="music-label">
            🎵 &nbsp;while you wait... some songs just for you
          </p>

          <div class="playlist">

            <div class="track" id="track-0" onclick="playTrack(0)">
              <div class="track-btn" id="btn-0">▶</div>
              <div class="track-info">
                <div class="track-name">I Love You</div>
                <div class="track-progress">
                  <div class="track-progress-fill" id="prog-0"></div>
                </div>
              </div>
            </div>

            <div class="track" id="track-1" onclick="playTrack(1)">
              <div class="track-btn" id="btn-1">▶</div>
              <div class="track-info">
                <div class="track-name">Colors To You</div>
                <div class="track-progress">
                  <div class="track-progress-fill" id="prog-1"></div>
                </div>
              </div>
            </div>

            <div class="track" id="track-2" onclick="playTrack(2)">
              <div class="track-btn" id="btn-2">▶</div>
              <div class="track-info">
                <div class="track-name">M Sirf Tumhara</div>
                <div class="track-progress">
                  <div class="track-progress-fill" id="prog-2"></div>
                </div>
              </div>
            </div>

            <div class="track" id="track-3" onclick="playTrack(3)">
              <div class="track-btn" id="btn-3">▶</div>
              <div class="track-info">
                <div class="track-name">Happy Birthday Golu</div>
                <div class="track-progress">
                  <div class="track-progress-fill" id="prog-3"></div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div><!-- end content-grid -->

  </main>

  <div class="sparkle-name">
    <span>Made with 💜 for <em>My Bachcha</em></span>
  </div>

  <script>
    // ── Countdown ──
    // ── Countdown ──
    const BIRTHDAY = new Date(2026, 5, 13, 0, 0, 0); // 15 June 2026
    const DAYS_BEFORE_UNLOCK = 15; // button won't work until 15 days before

    function tick() {
      const now = new Date();
      const diff = BIRTHDAY - now;

      if (diff <= 0) {
        window.location.href = 'reveal.html';
        return;
      }

      document.getElementById('d').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
      document.getElementById('h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
      document.getElementById('m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      document.getElementById('s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    }
    tick(); setInterval(tick, 1000);

    function tryPeek() {
      const diff = BIRTHDAY - new Date();
      const rukoEl = document.getElementById('rukoMsg');

      if (diff > 0) {
        // Birthday not arrived yet — show ruko message
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);

        let timeLeft = '';
        if (d > 0) timeLeft = `${d} din`;
        else if (h > 0) timeLeft = `${h} ghante`;
        else timeLeft = `${m} minute`;

        rukoEl.style.display = 'block';
        rukoEl.textContent = `Ruko zara, sabar karo... 🙏 abhi bhi ${timeLeft} baaki hain 💜`;
        setTimeout(() => { rukoEl.style.display = 'none'; }, 5000);
      } else {
        // Countdown done — go to reveal!
        window.location.href = 'reveal.html';
      }
    }



    const starsEl = document.getElementById('stars');
    const starEmojis = ['✦', '✧', '⭐', '✨', '★'];
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];
      s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;font-size:${Math.random() * 14 + 6}px;--d:${Math.random() * 3 + 1.5}s;animation-delay:${Math.random() * 3}s`;
      starsEl.appendChild(s);
    }

    // ── Shooting stars ──
    const ssc = document.getElementById('shootingStars');
    [{ top: 8, left: 10, len: 180, dur: 3.2, delay: 1, angle: -18 }, { top: 18, left: 55, len: 140, dur: 2.8, delay: 4, angle: -22 },
    { top: 5, left: 30, len: 220, dur: 3.8, delay: 7, angle: -15 }, { top: 25, left: 70, len: 160, dur: 2.5, delay: 10, angle: -20 },
    { top: 12, left: 80, len: 130, dur: 3.0, delay: 2.5, angle: -25 }, { top: 35, left: 20, len: 190, dur: 4.0, delay: 13, angle: -17 },
    { top: 8, left: 45, len: 150, dur: 2.6, delay: 16, angle: -21 }].forEach(d => {
      const el = document.createElement('div'); el.className = 'shooting-star';
      el.style.cssText = `top:${d.top}%;left:${d.left}%;width:${d.len}px;--dur:${d.dur}s;--delay:${d.delay}s;--angle:${d.angle}deg;--dist:${d.len + 60}px`;
      ssc.appendChild(el);
    });

    // ── Heart burst ──
    const heartEmojis = ['💜', '🌸', '💕', '✨', '💫', '🌷', '❤️', '🩷'];
    document.addEventListener('click', (e) => {
      for (let i = 0; i < 8; i++) {
        const h = document.createElement('div'); h.className = 'burst-heart';
        h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.5;
        const dist = 60 + Math.random() * 60;
        const dur = 0.7 + Math.random() * 0.5;
        h.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;--tx:${Math.cos(angle) * dist}px;--ty:${Math.sin(angle) * dist - 40}px;--s:${0.8 + Math.random() * 0.8}rem;--dur:${dur}s;--rot:${(Math.random() - 0.5) * 60}deg`;
        document.body.appendChild(h);
        setTimeout(() => h.remove(), dur * 1000 + 100);
      }
    });

    // ── Playlist ──
    // ✏️ EDIT: put your mp3 filenames in assets/ folder and update here
    const tracks = [
      'assets/oursong.mp3',  // song 1 — already done!
      'assets/song2.mp3',    // ✏️ rename your mp3 to song2.mp3
      'assets/song3.mp3',    // ✏️ rename your mp3 to song3.mp3
      'assets/song4.mp3',    // ✏️ rename your mp3 to song4.mp3
    ];

    let currentTrack = -1;
    let player = null;
    let progressInterval = null;

    function resetAll() {
      document.querySelectorAll('.track').forEach((t, i) => {
        t.classList.remove('active');
        document.getElementById('btn-' + i).textContent = '▶';
        document.getElementById('prog-' + i).style.width = '0%';
      });
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
    }

    function playTrack(index) {
      if (player) { player.pause(); player = null; }
      resetAll();

      // Clicking same track again = stop
      if (currentTrack === index) { currentTrack = -1; return; }

      currentTrack = index;
      player = new Audio(tracks[index]);
      player.volume = 0.7;
      player.play().catch(() => { });
      sessionStorage.setItem('musicPlaying', 'true');

      document.getElementById('track-' + index).classList.add('active');
      document.getElementById('btn-' + index).textContent = '⏸';

      // Live progress bar
      progressInterval = setInterval(() => {
        if (player && player.duration) {
          document.getElementById('prog-' + index).style.width = (player.currentTime / player.duration * 100) + '%';
        }
      }, 500);

      player.addEventListener('ended', () => {
        resetAll(); currentTrack = -1;
      });
    }
  </script>
</body>

</html>
